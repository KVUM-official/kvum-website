<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 32" width="256" height="32" shape-rendering="crispEdges" image-rendering="pixelated">
  <!--
    KVUM pixel cat sprite — 8 frames × 32×32, right-facing
    0–3: walk cycle (diagonal pair lift + landing)
    4–5: sit / breathe
    6–7: groom (paw down → paw to face)
    Leg x-positions: x=7 (BR) · x=11 (BL) · x=14 (FL) · x=18 (FR)
    Pair A = BL+FR (x=11 + x=18) lifts in frame 0
    Pair B = BR+FL (x=7  + x=14) lifts in frame 2
  -->
  <defs>
    <g id="cat-base">
      <!-- ears -->
      <rect x="14" y="10" width="2" height="3" fill="#e8e8ed"/>
      <rect x="20" y="10" width="2" height="3" fill="#e8e8ed"/>
      <rect x="13" y="12" width="1" height="1" fill="#e8e8ed"/>
      <rect x="22" y="12" width="1" height="1" fill="#e8e8ed"/>
      <!-- head -->
      <rect x="13" y="13" width="11" height="5" fill="#e8e8ed"/>
      <rect x="14" y="18" width="9" height="1" fill="#e8e8ed"/>
      <!-- VR headset band -->
      <rect x="12" y="14" width="12" height="2" fill="#1a3a8a"/>
      <rect x="14" y="14" width="9" height="1" fill="#00e0ff"/>
      <rect x="11" y="15" width="1" height="1" fill="#1a3a8a"/>
      <!-- nose -->
      <rect x="23" y="16" width="1" height="1" fill="#ff9eb8"/>
      <!-- body -->
      <rect x="6" y="18" width="14" height="5" fill="#e8e8ed"/>
      <rect x="7" y="23" width="13" height="1" fill="#e8e8ed"/>
      <!-- stripes -->
      <rect x="9"  y="19" width="1" height="2" fill="#7d808a"/>
      <rect x="12" y="19" width="1" height="2" fill="#7d808a"/>
      <rect x="9"  y="22" width="1" height="1" fill="#7d808a"/>
      <rect x="12" y="22" width="1" height="1" fill="#7d808a"/>
      <rect x="15" y="20" width="1" height="2" fill="#7d808a"/>
    </g>
  </defs>

  <!-- ===== FRAME 0: WALK stance A — pair A (BL=x11 + FR=x18) lifted ===== -->
  <g transform="translate(0,0)">
    <use href="#cat-base"/>
    <rect x="3" y="17" width="2" height="2" fill="#e8e8ed"/>
    <rect x="3" y="19" width="1" height="2" fill="#e8e8ed"/>
    <rect x="4" y="20" width="1" height="2" fill="#e8e8ed"/>
    <rect x="7"  y="23" width="2" height="5" fill="#e8e8ed"/>
    <rect x="11" y="23" width="2" height="2" fill="#e8e8ed"/>
    <rect x="14" y="23" width="2" height="5" fill="#e8e8ed"/>
    <rect x="18" y="23" width="2" height="2" fill="#e8e8ed"/>
  </g>

  <!-- ===== FRAME 1: WALK landing — all 4 down ===== -->
  <g transform="translate(32,0)">
    <use href="#cat-base"/>
    <rect x="3" y="18" width="2" height="2" fill="#e8e8ed"/>
    <rect x="3" y="20" width="1" height="2" fill="#e8e8ed"/>
    <rect x="7"  y="23" width="2" height="5" fill="#e8e8ed"/>
    <rect x="11" y="23" width="2" height="5" fill="#e8e8ed"/>
    <rect x="14" y="23" width="2" height="5" fill="#e8e8ed"/>
    <rect x="18" y="23" width="2" height="5" fill="#e8e8ed"/>
  </g>

  <!-- ===== FRAME 2: WALK stance B — pair B (BR=x7 + FL=x14) lifted ===== -->
  <g transform="translate(64,0)">
    <use href="#cat-base"/>
    <rect x="3" y="20" width="2" height="2" fill="#e8e8ed"/>
    <rect x="2" y="21" width="1" height="2" fill="#e8e8ed"/>
    <rect x="7"  y="23" width="2" height="2" fill="#e8e8ed"/>
    <rect x="11" y="23" width="2" height="5" fill="#e8e8ed"/>
    <rect x="14" y="23" width="2" height="2" fill="#e8e8ed"/>
    <rect x="18" y="23" width="2" height="5" fill="#e8e8ed"/>
  </g>

  <!-- ===== FRAME 3: WALK landing — all 4 down (alt tail) ===== -->
  <g transform="translate(96,0)">
    <use href="#cat-base"/>
    <rect x="3" y="18" width="2" height="2" fill="#e8e8ed"/>
    <rect x="4" y="20" width="1" height="2" fill="#e8e8ed"/>
    <rect x="7"  y="23" width="2" height="5" fill="#e8e8ed"/>
    <rect x="11" y="23" width="2" height="5" fill="#e8e8ed"/>
    <rect x="14" y="23" width="2" height="5" fill="#e8e8ed"/>
    <rect x="18" y="23" width="2" height="5" fill="#e8e8ed"/>
  </g>

  <!-- ===== FRAME 4: SIT 1 ===== -->
  <g transform="translate(128,0)">
    <use href="#cat-base"/>
    <rect x="5" y="22" width="2" height="1" fill="#e8e8ed"/>
    <rect x="4" y="20" width="1" height="3" fill="#e8e8ed"/>
    <rect x="4" y="18" width="2" height="2" fill="#e8e8ed"/>
    <rect x="7" y="22" width="3" height="2" fill="#e8e8ed"/>
    <rect x="14" y="23" width="2" height="5" fill="#e8e8ed"/>
    <rect x="18" y="23" width="2" height="5" fill="#e8e8ed"/>
  </g>

  <!-- ===== FRAME 5: SIT 2 ===== -->
  <g transform="translate(160,0)">
    <use href="#cat-base"/>
    <rect x="5" y="22" width="2" height="1" fill="#e8e8ed"/>
    <rect x="4" y="21" width="1" height="2" fill="#e8e8ed"/>
    <rect x="4" y="18" width="2" height="3" fill="#e8e8ed"/>
    <rect x="7" y="22" width="3" height="2" fill="#e8e8ed"/>
    <rect x="14" y="23" width="2" height="5" fill="#e8e8ed"/>
    <rect x="18" y="23" width="2" height="5" fill="#e8e8ed"/>
    <rect x="26" y="11" width="1" height="1" fill="#7d808a"/>
    <rect x="27" y="12" width="1" height="1" fill="#7d808a"/>
  </g>

  <!-- ===== FRAME 6: GROOM 1 ===== -->
  <g transform="translate(192,0)">
    <use href="#cat-base"/>
    <rect x="5" y="22" width="2" height="1" fill="#e8e8ed"/>
    <rect x="4" y="20" width="1" height="3" fill="#e8e8ed"/>
    <rect x="4" y="18" width="2" height="2" fill="#e8e8ed"/>
    <rect x="7" y="22" width="3" height="2" fill="#e8e8ed"/>
    <rect x="14" y="20" width="2" height="3" fill="#e8e8ed"/>
    <rect x="18" y="23" width="2" height="5" fill="#e8e8ed"/>
  </g>

  <!-- ===== FRAME 7: GROOM 2 ===== -->
  <g transform="translate(224,0)">
    <use href="#cat-base"/>
    <rect x="5" y="22" width="2" height="1" fill="#e8e8ed"/>
    <rect x="4" y="20" width="1" height="3" fill="#e8e8ed"/>
    <rect x="4" y="18" width="2" height="2" fill="#e8e8ed"/>
    <rect x="7" y="22" width="3" height="2" fill="#e8e8ed"/>
    <rect x="20" y="17" width="2" height="2" fill="#e8e8ed"/>
    <rect x="20" y="19" width="1" height="2" fill="#e8e8ed"/>
    <rect x="18" y="23" width="2" height="5" fill="#e8e8ed"/>
    <rect x="22" y="17" width="1" height="1" fill="#ff5c8a"/>
  </g>
</svg>
